# Nginx reverse proxy for Neo Block Dev
# Replace DOMAIN with your GoDaddy domain (e.g. neoblock.dev)
# Install: sudo cp deploy/nginx-neoblock.conf /etc/nginx/sites-available/neoblock.dev
#          sudo ln -sf /etc/nginx/sites-available/neoblock.dev /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d neoblock.dev -d www.neoblock.dev

upstream neoblock_dev {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name neoblock.dev www.neoblock.dev;

    client_max_body_size 10M;

    location / {
        proxy_pass http://neoblock_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
